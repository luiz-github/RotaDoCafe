appId: ${APP_ID}
---
- launchApp:
    clearState: true

- tapOn: "Digite seu e-mail"
- inputText: "${SUPERADMIN_EMAIL}"

- tapOn: "Digite sua senha"
- inputText: "${SUPERADMIN_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

- assertVisible: "Rota do Café"

- tapOn: "Eventos"

- tapOn:
    id: "event-card"

- assertVisible:
    id: "event-details-screen"

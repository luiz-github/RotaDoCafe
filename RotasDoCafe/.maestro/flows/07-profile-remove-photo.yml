appId: ${APP_ID}
---
- launchApp:
    clearState: true

- tapOn: "Digite seu e-mail"
- eraseText
- inputText: "${TEST_EMAIL}"

- tapOn: "Digite sua senha"
- eraseText
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

- extendedWaitUntil:
    visible: "Rota do Café"
    timeout: 10000

- tapOn:
    id: "tab-perfil"

- assertVisible: "Perfil"

- tapOn:
    id: "profile-avatar"

- assertVisible: "Escolher foto"

- assertVisible: "Remover foto"

- tapOn: "Remover foto"

- extendedWaitUntil:
    visible: "Toque para alterar foto"
    timeout: 5000

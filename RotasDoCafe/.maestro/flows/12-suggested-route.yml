appId: ${APP_ID}
---
- launchApp:
    clearState: true

- tapOn: "Digite seu e-mail"
- eraseText
- inputText: "${TEST_EMAIL}"

- tapOn: "Digite sua senha"
- eraseText
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

- extendedWaitUntil:
    visible: "Rota do Café"
    timeout: 10000

- tapOn:
    id: "suggested-route-card"

- extendedWaitUntil:
    visible:
      id: "route-info-card"
    timeout: 10000

- assertVisible:
    id: "map-screen"

- assertVisible:
    id: "route-info-card"

- tapOn:
    id: "route-point-0"

- tapOn:
    id: "route-point-1"

- tapOn:
    id: "route-point-2"

- tapOn:
    id: "route-point-3"

- tapOn:
    id: "route-info-close"

- assertNotVisible:
    id: "route-info-card"

- assertVisible:
    id: "map-screen"

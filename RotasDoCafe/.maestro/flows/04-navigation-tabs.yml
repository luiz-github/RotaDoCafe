appId: ${APP_ID}
---
- launchApp:
    clearState: true
- tapOn: "Digite seu e-mail"
- inputText: "${TEST_EMAIL}"

- tapOn: "Digite sua senha"
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

# - extendedWaitUntil:
#     visible: "No thanks"
#     timeout: 5000

# - tapOn: "No thanks"

- assertVisible: "Rota do Café"

- tapOn: 
    id: "tab-categoria"
- assertVisible: "Descubra experiências únicas ☕"

- tapOn:
    id: "tab-explorar"

- assertVisible:
    id: "map-screen"

- tapOn: "Eventos"
- assertVisible: "Eventos"

- tapOn: "Perfil"
- assertVisible: "Perfil"

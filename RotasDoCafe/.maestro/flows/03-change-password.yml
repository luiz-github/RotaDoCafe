appId: ${APP_ID}
---
- launchApp:
    clearState: true

- tapOn: "Digite seu e-mail"
- inputText: "${TEST_EMAIL}"

- tapOn: "Digite sua senha"
- inputText: "${TEST_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

- assertVisible: "Rota do Café"

- tapOn: "Perfil"

- tapOn:
    id: "edit-profile-button"

- tapOn:
    id: "current-password-input"
- inputText: "${TEST_PASSWORD}"

- hideKeyboard

- tapOn:
    id: "new-password-input"
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn:
    id: "confirm-password-input"
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn:
    id: "save-profile-button"

- tapOn:
    id: "logout-button"

- tapOn: "SAIR"

- tapOn: "Digite seu e-mail"
- inputText: "${TEST_EMAIL}"

- tapOn: "Digite sua senha"
- inputText: "${TEST_NEW_PASSWORD}"

- hideKeyboard

- tapOn: "Entrar"

- assertVisible: "Rota do Café"
